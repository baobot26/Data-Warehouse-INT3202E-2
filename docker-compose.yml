services:
  postgres:
    image: postgres:16-alpine
    container_name: dw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: warehouse
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse -d warehouse"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7.0
    container_name: dw-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/01-mongo-init.js:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh mongodb://root:rootpassword@localhost:27017/admin --quiet --eval \"db.runCommand({ ping: 1 }).ok\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  etl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dw-etl
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: warehouse
      PGUSER: warehouse
      PGPASSWORD: warehouse
      MONGO_URI: mongodb://root:rootpassword@mongodb:27017/?authSource=admin
      MONGO_DB: landing
    restart: "no"

volumes:
  postgres_data:
  mongo_data:
