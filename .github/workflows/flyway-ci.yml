name: flyway-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  migration-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: warehouse
          POSTGRES_USER: warehouse
          POSTGRES_PASSWORD: warehouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U warehouse -d warehouse"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Flyway Migration Test
        run: |
          # Chạy migrate thật lên database tạm của GitHub Actions
          docker run --rm --network host \
            -v "${{ github.workspace }}/db/migration:/flyway/sql:ro" \
            flyway/flyway:10-alpine \
            -url="jdbc:postgresql://localhost:5432/warehouse" \
            -user="warehouse" \
            -password="warehouse" \
            -locations="filesystem:/flyway/sql" \
            -connectRetries=60 \
            migrate